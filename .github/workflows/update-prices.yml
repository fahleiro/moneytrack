name: Atualizar cotações EOD

# Roda 1x/dia após o fechamento de B3 (~20:00 UTC) e NYSE (~21:00 UTC),
# em dias de semana. O cron do GitHub Actions é sempre UTC e não ajusta
# horário de verão — 23:00 UTC dá margem o ano todo. Também pode ser
# disparado manualmente (workflow_dispatch).
on:
  schedule:
    - cron: "0 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Atualizar preços EOD
        run: node scripts/update-prices.mjs

      - name: Commit e push (só se houver mudança)
        run: |
          if [ -n "$(git status --porcelain data/market_history)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/market_history
            git commit -m "chore(data): EOD prices $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Sem mudanças — nada a commitar."
          fi
