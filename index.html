<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>moneytrack</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0d1117; color: #e6edf3; padding: 24px;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: #8b949e; font-size: 13px; margin-bottom: 20px; max-width: 900px; }
    .cards { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 10px;
      padding: 14px 18px; min-width: 150px;
    }
    .card .label { color: #8b949e; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
    .up { color: #3fb950; } .down { color: #f85149; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar button, .toolbar select {
      background: #21262d; color: #e6edf3; border: 1px solid #30363d;
      border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px;
    }
    .toolbar button.active { background: #1f6feb; border-color: #1f6feb; }
    .chart-wrap { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; }
    canvas { max-height: 420px; }

    /* topo: dropdown mínimo de navegação (Home / Timeline) */
    .topbar { display: flex; margin-bottom: 14px; }
    .topbar select {
      background: #21262d; color: #e6edf3; border: 1px solid #30363d;
      border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 13px;
    }

    /* Timeline: nav em pílula ◀ ano ▶ */
    .chrono { padding: 8px 0 28px; }
    .chrono-bar { display: flex; justify-content: center; margin-bottom: 6px; }
    .chrono-nav {
      display: inline-flex; align-items: center; gap: 6px;
      background: #161b22; border: 1px solid #30363d; border-radius: 999px; padding: 4px 8px;
    }
    .cn-arrow {
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer; padding: 0;
      border: 1px solid #30363d; background: #21262d; color: #8b949e; font-size: 11px; line-height: 1;
    }
    .cn-arrow:hover:not(:disabled) { background: #30363d; color: #e6edf3; }
    .cn-arrow:disabled { opacity: .35; cursor: default; }
    .cn-label { min-width: 76px; text-align: center; font-weight: 700; font-size: 13px; color: #e6edf3; }

    /* Timeline: trilha com linha contínua + círculos (um por data) */
    .chrono-track {
      position: relative; display: flex; align-items: flex-start; gap: 10px;
      overflow-x: auto; padding: 22px 10px 8px;
    }
    .chrono-track::before {
      content: ''; position: absolute; left: 12px; right: 12px; top: 44px; height: 2px;
      background: linear-gradient(90deg, #21262d, #30363d, #21262d); z-index: 0;
    }
    .chrono-node {
      position: relative; z-index: 1; flex: 0 0 auto; min-width: 64px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .chrono-hit {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      background: none; border: 0; cursor: default; padding: 0; width: 100%;
    }
    .chrono-cnt {
      font-size: 10px; font-weight: 700; color: #8b949e; background: #21262d;
      border: 1px solid #30363d; border-radius: 999px; padding: 0 6px; line-height: 16px; min-width: 16px;
    }
    .chrono-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid #6ea8fe; background: #1f6feb;
    }
    .chrono-lbl { font-size: 12px; color: #8b949e; font-weight: 600; }
    /* um "E" clicável POR evento, empilhados abaixo da data; cada um abre o modal */
    .chrono-es { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .chrono-e {
      cursor: pointer; padding: 1px 5px; border-radius: 4px; line-height: 1.1;
      border: 1px solid #2c3b5e; background: #16203a; color: #6ea8fe;
      font-size: 11px; font-weight: 800; letter-spacing: .04em;
    }
    .chrono-e:hover { background: #1e2c4e; color: #9fc4ff; border-color: #3a4f7e; }
    .chrono-empty { color: #8b949e; font-size: 13px; padding: 24px 10px; text-align: center; }

    /* modal de detalhe de evento */
    .modal-back {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 60;
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal {
      background: #161b22; border: 1px solid #30363d; border-radius: 14px;
      width: min(460px, 100%); max-height: 80vh; overflow: auto;
    }
    .modal-h {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 14px 16px; border-bottom: 1px solid #21262d;
    }
    .modal-h h3 { margin: 0; font-size: 15px; }
    .modal-x { background: none; border: 0; color: #8b949e; font-size: 16px; cursor: pointer; }
    .modal-x:hover { color: #fff; }
    .modal-body { padding: 12px 16px 16px; }
    .ev-det { display: flex; flex-direction: column; gap: 10px; }
    .ev-det > div { display: flex; flex-direction: column; gap: 2px; }
    .ev-k { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    .muted { color: #8b949e; }
  </style>
</head>
<body>
  <div class="topbar">
    <select id="view">
      <option value="home">Home</option>
      <option value="timeline">Timeline</option>
    </select>
  </div>

  <div id="home-view">
    <h1 id="title">moneytrack</h1>
    <div class="sub" id="sub">Histórico diário · dados em JSON versionado (data/)</div>

    <div class="cards" id="cards"></div>

    <div class="toolbar" id="ranges">
      <select id="serie"></select>
      <button data-range="365">1A</button>
      <button data-range="1825">5A</button>
      <button data-range="3650">10A</button>
      <button data-range="0" class="active">Tudo</button>
    </div>

    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <div id="timeline-view" class="chrono" hidden>
    <h1>Timeline</h1>
    <div class="sub">Eventos por data · data/events.json</div>
    <div class="chrono-bar">
      <div class="chrono-nav" role="group" aria-label="navegação da linha do tempo">
        <button class="cn-arrow" id="tl-prev" title="voltar">◀</button>
        <span class="cn-label" id="tl-year"></span>
        <button class="cn-arrow" id="tl-next" title="avançar">▶</button>
      </div>
    </div>
    <div class="chrono-track" id="tl-track"></div>
  </div>

  <script>
    let full = [];
    let chart;
    let catalog = {};   // key -> {label, sub, file, unit}
    let currentUnit = "index";

    function fmt(n) {
      const dec = currentUnit === "index" ? 0 : 2;
      const s = n.toLocaleString("pt-BR", { minimumFractionDigits: 0, maximumFractionDigits: dec });
      return currentUnit.startsWith("pct") ? s + "%" : s;
    }

    function renderCards(series) {
      if (!series.length) return;
      const first = series[0], last = series[series.length - 1];
      const change = ((last.value - first.value) / first.value) * 100;
      let max = series[0], min = series[0];
      for (const p of series) {
        if (p.value > max.value) max = p;
        if (p.value < min.value) min = p;
      }
      const cls = change >= 0 ? "up" : "down";
      const sign = change >= 0 ? "+" : "";
      document.getElementById("cards").innerHTML = `
        <div class="card"><div class="label">Último (${last.tradingDay})</div><div class="value">${fmt(last.value)}</div></div>
        <div class="card"><div class="label">Variação no período</div><div class="value ${cls}">${sign}${change.toFixed(1)}%</div></div>
        <div class="card"><div class="label">Máxima</div><div class="value">${fmt(max.value)} <span style="font-size:12px;color:#8b949e">${max.tradingDay}</span></div></div>
        <div class="card"><div class="label">Mínima</div><div class="value">${fmt(min.value)} <span style="font-size:12px;color:#8b949e">${min.tradingDay}</span></div></div>
        <div class="card"><div class="label">Pregões</div><div class="value">${series.length.toLocaleString("pt-BR")}</div></div>`;
    }

    function draw(series) {
      renderCards(series);
      const data = {
        labels: series.map((p) => p.tradingDay),
        datasets: [{
          data: series.map((p) => p.value),
          borderColor: "#1f6feb", backgroundColor: "rgba(31,111,235,.12)",
          borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.05,
        }],
      };
      const opts = {
        responsive: true, animation: false,
        interaction: { mode: "index", intersect: false },
        scales: {
          x: { ticks: { maxTicksLimit: 12, color: "#8b949e" }, grid: { color: "#21262d" } },
          y: { ticks: { color: "#8b949e", callback: (v) => fmt(v) }, grid: { color: "#21262d" } },
        },
        plugins: { legend: { display: false } },
      };
      if (chart) { chart.data = data; chart.options = opts; chart.update(); }
      else chart = new Chart(document.getElementById("chart"), { type: "line", data, options: opts });
    }

    function applyRange(days) {
      if (!days || !full.length) return draw(full);
      const cutoff = new Date(full[full.length - 1].tradingDay);
      cutoff.setDate(cutoff.getDate() - days);
      const iso = cutoff.toISOString().slice(0, 10);
      draw(full.filter((p) => p.tradingDay >= iso));
    }

    function activeRange() {
      const b = document.querySelector("#ranges button.active");
      return b ? Number(b.dataset.range) : 0;
    }

    async function loadSerie(key) {
      const meta = catalog[key];
      if (!meta) return;
      currentUnit = meta.unit;
      document.getElementById("title").textContent = meta.label;
      document.getElementById("sub").textContent = meta.sub;
      try {
        full = await fetch("data/" + meta.file).then((r) => r.json());
        applyRange(activeRange());
      } catch {
        document.getElementById("cards").innerHTML = "<div class='card'>Erro ao carregar data/" + meta.file + "</div>";
      }
    }

    document.getElementById("ranges").addEventListener("click", (e) => {
      if (e.target.tagName !== "BUTTON") return;
      document.querySelectorAll("#ranges button").forEach((b) => b.classList.remove("active"));
      e.target.classList.add("active");
      applyRange(Number(e.target.dataset.range));
    });

    document.getElementById("serie").addEventListener("change", (e) => loadSerie(e.target.value));

    async function init() {
      const [indices, assets] = await Promise.all([
        fetch("data/indices.json").then((r) => r.json()),
        fetch("data/assets.json").then((r) => r.json()),
      ]);
      const sel = document.getElementById("serie");
      const addGroup = (label, items) => {
        if (!items.length) return;
        const g = document.createElement("optgroup");
        g.label = label;
        for (const it of items) {
          const o = document.createElement("option");
          o.value = it.key; o.textContent = it.text;
          g.appendChild(o);
        }
        sel.appendChild(g);
      };

      const idxItems = [];
      for (const i of indices.filter((x) => x.file)) {
        const key = "idx:" + i.code;
        catalog[key] = { label: i.name, sub: i.description || (i.country + " · " + i.unit), file: i.file, unit: i.unit };
        idxItems.push({ key, text: i.code.replace(/^(BR|US)_/, "") + " — " + i.name });
      }
      addGroup("Índices", idxItems);

      const idxFiles = new Set(indices.filter((x) => x.file).map((x) => x.file));
      const byType = { stock: [], etf: [], commodity: [] };
      for (const a of assets.filter((x) => x.file && !idxFiles.has(x.file))) {
        const key = "ast:" + a.ticker;
        const bits = [a.type, a.country, a.sectors.join(", ")].filter(Boolean).join(" · ");
        catalog[key] = { label: a.ticker + " — " + a.name, sub: bits, file: a.file, unit: "usd" };
        (byType[a.type] || (byType[a.type] = [])).push({ key, text: a.ticker + " — " + a.name });
      }
      addGroup("Ações", byType.stock);
      addGroup("ETFs", byType.etf);
      addGroup("Commodities", byType.commodity);

      const first = "idx:BR_IBOV";
      sel.value = first;
      loadSerie(first);
    }

    init().catch(() => {
      document.getElementById("cards").innerHTML = "<div class='card'>Erro ao carregar data/indices.json / data/assets.json.</div>";
    });

    /* ============================ Timeline ============================ */
    let events = null;      // eventos de data/events.json
    let tlYear = null;      // ano em foco na trilha

    const dmy = (s) => (s ? s.split("-").reverse().join("/") : "—");
    const flag = (c) => (c === "BR" ? "🇧🇷" : (c === "US" || c === "USA") ? "🇺🇸" : "");
    const evLabel = (e) => e.ticker || (e.code === "FED_SUPER_WED" ? "FED" : (e.type || "?").toUpperCase());
    const esc = (s) => String(s).replace(/[&<>"]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));

    function tlYears() {
      return [...new Set(events.map((e) => +e.date.slice(0, 4)))].sort((a, b) => a - b);
    }

    function renderTimeline() {
      const ys = tlYears();
      document.getElementById("tl-year").textContent = tlYear;
      document.getElementById("tl-prev").disabled = !ys.length || tlYear <= ys[0];
      document.getElementById("tl-next").disabled = !ys.length || tlYear >= ys[ys.length - 1];

      // agrupa por data dentro do ano em foco: um círculo por data
      const byDate = {};
      for (const e of events.filter((e) => e.date.startsWith(String(tlYear))))
        (byDate[e.date] = byDate[e.date] || []).push(e);
      const dates = Object.keys(byDate).sort();

      const track = document.getElementById("tl-track");
      if (!dates.length) {
        track.innerHTML = "<div class='chrono-empty'>sem eventos em " + tlYear + ".</div>";
        return;
      }
      track.innerHTML = dates.map((d) => {
        const list = byDate[d];
        const es = list.map((e) => {
          const i = events.indexOf(e);
          return `<button class="chrono-e" data-ev="${i}" title="${esc(dmy(e.date) + " · " + evLabel(e) + " " + e.title)}">E</button>`;
        }).join("");
        return `<div class="chrono-node">
          <div class="chrono-hit" title="${dmy(d)} · ${list.length} evento(s)">
            <span class="chrono-cnt">${list.length}</span>
            <span class="chrono-dot"></span>
            <span class="chrono-lbl">${dmy(d).slice(0, 5)}</span>
          </div>
          <div class="chrono-es">${es}</div>
        </div>`;
      }).join("");
    }

    function openModal(e) {
      const today = new Date().toISOString().slice(0, 10);
      const days = Math.round((new Date(e.date) - new Date(today)) / 86400000);
      const when = days === 0 ? "hoje" : days === 1 ? "amanhã" : days < 0 ? `há ${-days} dias` : `em ${days} dias`;
      const typeLbl = e.type === "earnings" ? "Resultado / Earnings" : e.type;
      const back = document.createElement("div");
      back.className = "modal-back";
      back.innerHTML = `<div class="modal">
        <header class="modal-h">
          <h3>${flag(e.country)} ${esc(evLabel(e))} <span class="muted">· ${esc(e.title)}</span></h3>
          <button class="modal-x">✕</button>
        </header>
        <div class="modal-body">
          <div class="ev-det">
            <div><span class="ev-k">Evento</span><b>${esc(e.title)}</b></div>
            <div><span class="ev-k">Tipo</span><b>${esc(typeLbl)}</b></div>
            <div><span class="ev-k">Data</span><b>${dmy(e.date)} <em class="muted">(${when})</em></b></div>
            ${e.ticker ? `<div><span class="ev-k">Ticker</span><b>${esc(e.ticker)}</b></div>` : ""}
          </div>
        </div>
      </div>`;
      back.addEventListener("click", (ev) => {
        if (ev.target === back || ev.target.classList.contains("modal-x")) back.remove();
      });
      document.body.appendChild(back);
    }

    async function initTimeline() {
      if (events) return;
      try {
        events = await fetch("data/events.json").then((r) => r.json());
      } catch {
        events = [];
      }
      const ys = tlYears();
      const now = new Date().getFullYear();
      tlYear = ys.includes(now) ? now : (ys.length ? ys[ys.length - 1] : now);
      renderTimeline();
    }

    document.getElementById("tl-prev").addEventListener("click", () => { tlYear--; renderTimeline(); });
    document.getElementById("tl-next").addEventListener("click", () => { tlYear++; renderTimeline(); });
    document.getElementById("tl-track").addEventListener("click", (ev) => {
      const b = ev.target.closest(".chrono-e");
      if (b) openModal(events[+b.dataset.ev]);
    });

    document.getElementById("view").addEventListener("change", (e) => {
      const tl = e.target.value === "timeline";
      document.getElementById("home-view").hidden = tl;
      document.getElementById("timeline-view").hidden = !tl;
      if (tl) initTimeline();
    });
  </script>
</body>
</html>
